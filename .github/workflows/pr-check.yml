name: PR Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH for submodules
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SUBMODULE_SSH_KEY }}

      - name: Checkout submodules
        run: git submodule update --init --recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable corepack and install pnpm
        run: corepack enable && corepack prepare pnpm@10.28.1 --activate

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run typecheck
        run: pnpm run typecheck

      # Fast targeted signal for the custom `no-io-in-transaction` ESLint rule
      # (eslint-local-rules.js) via its RuleTester suite. Subsumed by the
      # `unit-tests` job below (which runs the full vitest suite) but kept as a
      # cheap early-fail within the typecheck job.
      - name: Test lint rules
        run: pnpm run test:lint-rules

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH for submodules
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SUBMODULE_SSH_KEY }}

      - name: Checkout submodules
        run: git submodule update --init --recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable corepack and install pnpm
        run: corepack enable && corepack prepare pnpm@10.28.1 --activate

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Full vitest suite (857 tests). Made CI-green by #2478; previously this ran
      # report-only in the DP Tekton preview pipeline (unit-tests-task.yaml). The
      # suite is unit-level — no DB/Redis services needed; Prisma client comes from
      # the install postinstall, same as the typecheck job.
      - name: Run unit tests
        run: pnpm run test:unit:run

  bundle-budget:
    name: Bundle Budget
    runs-on: ubuntu-latest
    # REPORT-ONLY during the soak (continue-on-error). This is the FIRST workflow
    # to run a full `next build` in GH Actions. The build wants ~8GB heap
    # (Dockerfile NODE_BUILD_MEM=8192) while standard ubuntu-latest is ~7GB, so the
    # early runs also probe feasibility — if Build OOMs, move this job to a larger
    # runner label (e.g. a 4-core/16GB runner) before relying on it.
    # The limits in .size-limit.json are intentionally loose; once a baseline is
    # observed, tighten them to baseline+headroom, drop continue-on-error, and add
    # "Bundle Budget" to main's required checks to GATE. Next 16 removed per-route
    # build stats, so this is our only bundle-size regression signal.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH for submodules
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SUBMODULE_SSH_KEY }}

      - name: Checkout submodules
        run: git submodule update --init --recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable corepack and install pnpm
        run: corepack enable && corepack prepare pnpm@10.28.1 --activate

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Production build (the `prebuild` script runs build:workers first).
      # SKIP_ENV_VALIDATION mirrors the Dockerfile build so no runtime secrets are
      # needed — we only measure the emitted client chunks, we never run the app.
      - name: Build
        run: SKIP_ENV_VALIDATION=1 IS_BUILD=true NODE_OPTIONS="--max_old_space_size=6144" pnpm run build

      # Brotli size of the shared client chunks vs .size-limit.json (report-only).
      - name: Check bundle size
        run: pnpm run size
